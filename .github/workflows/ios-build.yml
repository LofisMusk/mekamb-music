name: iOS Build & Test

# Weryfikuje, że native-ios/MekambMusicNative kompiluje się na CI (build-for-testing
# na symulatorze). Publikowanie release'ów (razem z Androidem) obsługuje
# mobile-release.yml — ten workflow to tylko ciągła weryfikacja na push/PR.

on:
  push:
    branches: [main]
    paths:
      - "native-ios/**"
      - ".github/workflows/ios-build.yml"
  pull_request:
    paths:
      - "native-ios/**"
  workflow_dispatch:

env:
  PROJECT_PATH: native-ios/MekambMusicNative.xcodeproj
  SCHEME: MekambMusicNative

jobs:
  build-and-test:
    name: Build & Test (Simulator)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$LATEST_XCODE" ]; then
            LATEST_XCODE="/Applications/Xcode.app"
          fi
          echo "Using $LATEST_XCODE"
          sudo xcode-select -switch "$LATEST_XCODE/Contents/Developer"

      - name: Show Xcode & SDK versions
        run: xcodebuild -version && xcodebuild -showsdks

      - name: Resolve simulator destination
        id: sim
        run: |
          DEVICE=$(xcrun simctl list devices available \
            | grep -m1 -E "iPhone (1[5-9]|[2-9][0-9])" \
            | sed -E 's/^[[:space:]]*(iPhone[^(]+)\(.*/\1/' \
            | sed -E 's/[[:space:]]+$//')
          if [ -z "$DEVICE" ]; then
            DEVICE=$(xcrun simctl list devices available \
              | grep -m1 "iPhone" \
              | sed -E 's/^[[:space:]]*(iPhone[^(]+)\(.*/\1/' \
              | sed -E 's/[[:space:]]+$//')
          fi
          echo "device=$DEVICE" >> "$GITHUB_OUTPUT"
          echo "Using simulator device: $DEVICE"

      - name: Build for testing (Debug, simulator, unsigned)
        run: |
          xcodebuild build-for-testing \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.device }}" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty && exit ${PIPESTATUS[0]}

      # Brak celu testowego (XCTest target) w projekcie MekambMusicNative.xcodeproj —
      # xcodebuild test-without-building nie ma czego uruchomić (scheme nie jest
      # skonfigurowany pod akcję "Test"). Krok usunięty do czasu dodania realnego
      # test targetu; wcześniej ten krok zawsze kończył się błędem.
