name: Deploy backend

on:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "alembic/**"
      - "scripts/**"
      - "Dockerfile"
      - "docker-compose.yml"
      - "pyproject.toml"
      - "alembic.ini"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch:

concurrency:
  group: backend-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.BACKEND_SSH_KEY }}" > ~/.ssh/backend_deploy_key
          chmod 600 ~/.ssh/backend_deploy_key
          ssh-keyscan -H "${{ secrets.BACKEND_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy on backend
        env:
          BACKEND_HOST: ${{ secrets.BACKEND_HOST }}
          BACKEND_USER: ${{ secrets.BACKEND_USER }}
          BACKEND_APP_DIR: ${{ secrets.BACKEND_APP_DIR }}
        run: |
          ssh -i ~/.ssh/backend_deploy_key \
            -o BatchMode=yes \
            "$BACKEND_USER@$BACKEND_HOST" \
            "cd '$BACKEND_APP_DIR' && \
             git fetch origin main --prune && \
             git reset --hard origin/main && \
             find . \( -name '._*' -o -name '.__*' \) -delete && \
             docker compose build api worker && \
             docker compose run --rm --no-deps -v \"\$PWD:/repo\" -w /repo api alembic upgrade head && \
             docker compose up -d --force-recreate api worker && \
             sleep 5 && \
             curl -fsS http://127.0.0.1:8000/health"
