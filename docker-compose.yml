services:
  api:
    build: .
    user: "1000:1000"
    env_file: .env
    depends_on:
      volume-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      lidarr:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - quarantine:/data/quarantine
      - library:/data/library
      # Lidarr's organized output, ingested into the library. Mounted at the same
      # path Lidarr uses so webhook trackFile paths resolve on both sides.
      - library-source:/data/library-source
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: .
    user: "1000:1000"
    env_file: .env
    depends_on:
      volume-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      lidarr:
        condition: service_started
    command: ["python", "-m", "app.workers.import_worker"]
    volumes:
      - quarantine:/data/quarantine
      - library:/data/library
      - library-source:/data/library-source

  volume-init:
    image: alpine:3.20
    command: ["sh", "-c", "chown -R 1000:1000 /data/quarantine /data/library /data/library-source"]
    volumes:
      - quarantine:/data/quarantine
      - library:/data/library
      - library-source:/data/library-source

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: music
      POSTGRES_USER: music
      POSTGRES_PASSWORD: music
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-miniosecret}
    volumes:
      - minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-miniosecret}
      S3_BUCKET: ${S3_BUCKET:-music-library}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 2; done;
      mc mb --ignore-existing local/$$S3_BUCKET;
      "

  servarr-auth-init:
    image: python:3.12-alpine
    env_file: .env
    environment:
      LIDARR_CONFIG_DIR: /lidarr-config
      PROWLARR_CONFIG_DIR: /prowlarr-config
    command: ["python", "/scripts/configure_servarr_auth.py"]
    volumes:
      - ./scripts/configure_servarr_auth.py:/scripts/configure_servarr_auth.py:ro
      - lidarr-config:/lidarr-config
      - prowlarr-config:/prowlarr-config

  # Lidarr owns discovery/monitoring/downloading and writes organized albums into
  # /data/library-source. Point its root folder at /data/library-source and set
  # Connect → Webhook to http://api:8000/catalog/webhook?token=$LIDARR_WEBHOOK_TOKEN.
  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    depends_on:
      servarr-auth-init:
        condition: service_completed_successfully
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Warsaw
    ports:
      - "8686:8686"
    volumes:
      - lidarr-config:/config
      - library-source:/data/library-source
      - downloads:/downloads
    restart: unless-stopped

  # qBittorrent is Lidarr's download client (the backend no longer talks to it).
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Warsaw
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    volumes:
      - qbittorrent-config:/config
      - downloads:/downloads
    restart: unless-stopped

  # Prowlarr feeds indexers to Lidarr.
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    depends_on:
      servarr-auth-init:
        condition: service_completed_successfully
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Warsaw
    ports:
      - "9696:9696"
    volumes:
      - prowlarr-config:/config
    restart: unless-stopped

volumes:
  postgres:
  minio:
  quarantine:
  library:
  library-source:
  downloads:
  lidarr-config:
  qbittorrent-config:
  prowlarr-config:
