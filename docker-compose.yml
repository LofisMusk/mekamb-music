services:
  api:
    build: .
    user: "1000:1000"
    env_file: .env
    depends_on:
      volume-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      qbittorrent:
        condition: service_started
    ports:
      - "8000:8000"
    volumes:
      - quarantine:/data/quarantine
      - library:/data/library
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=2)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build: .
    user: "1000:1000"
    env_file: .env
    depends_on:
      volume-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
      qbittorrent:
        condition: service_started
    command: ["python", "-m", "app.workers.import_worker"]
    volumes:
      - quarantine:/data/quarantine
      - library:/data/library

  volume-init:
    image: alpine:3.20
    command: ["sh", "-c", "chown -R 1000:1000 /data/quarantine /data/library"]
    volumes:
      - quarantine:/data/quarantine
      - library:/data/library

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: music
      POSTGRES_USER: music
      POSTGRES_PASSWORD: music
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-miniosecret}
    volumes:
      - minio:/data
    ports:
      - "9000:9000"
      - "9001:9001"

  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_started
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_ACCESS_KEY:-miniosecret}
      S3_BUCKET: ${S3_BUCKET:-music-library}
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD; do sleep 2; done;
      mc mb --ignore-existing local/$$S3_BUCKET;
      "

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    environment:
      PUID: 1000
      PGID: 1000
      TZ: Europe/Warsaw
      WEBUI_PORT: 8080
      TORRENTING_PORT: ${TORRENT_LISTEN_PORT:-6881}
    ports:
      - "8080:8080"
      - "${TORRENT_LISTEN_PORT:-6881}:${TORRENT_LISTEN_PORT:-6881}"
      - "${TORRENT_LISTEN_PORT:-6881}:${TORRENT_LISTEN_PORT:-6881}/udp"
    volumes:
      - qbittorrent-config:/config
      - quarantine:/downloads/incomplete
    restart: unless-stopped

volumes:
  postgres:
  minio:
  quarantine:
  library:
  qbittorrent-config:
