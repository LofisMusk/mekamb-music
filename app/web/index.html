<!doctype html>
<html lang="pl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mekamb Music</title>
    <link rel="stylesheet" href="static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <aside class="sidebar">
        <div id="sidebarResizer" class="sidebar-resizer" aria-hidden="true"></div>
        <div class="brand-block">
          <div>
            <p class="eyebrow">Mekamb Music</p>
            <h1>Biblioteka</h1>
          </div>
        </div>

        <nav class="main-nav" aria-label="Widoki">
          <button class="nav-tab active" type="button" data-page="home">Biblioteka</button>
          <button class="nav-tab" type="button" data-page="albums">Albumy</button>
          <button class="nav-tab" type="button" data-page="tracks">Utwory</button>
          <button class="nav-tab" type="button" data-page="liked">Polubione</button>
        </nav>

        <section class="sidebar-section">
          <h2>Sugestie torrentów</h2>
          <div id="sourceResults" class="list compact empty">Brak sugestii.</div>
        </section>

        <section class="sidebar-section">
          <div class="sidebar-head">
            <h2>Kolejka importu</h2>
            <button id="refreshImports" class="quiet small" type="button">Odśwież</button>
          </div>
          <div id="importsList" class="list compact empty">Brak danych.</div>
        </section>

        <form id="tokenForm" class="token-form">
          <label for="apiEndpointsInput">Adresy API</label>
          <textarea
            id="apiEndpointsInput"
            name="apiEndpoints"
            rows="2"
            spellcheck="false"
            placeholder="https://music.example.com&#10;http://home-server:8000"
          ></textarea>
          <p id="apiBaseStatus" class="connection-status">Brak aktywnego API</p>
          <label for="tokenInput">API token</label>
          <div class="token-row">
            <input id="tokenInput" name="token" type="password" autocomplete="off" placeholder="Bearer token" />
            <button type="submit">Połącz</button>
          </div>
        </form>
      </aside>

      <section class="main-area">
        <header class="topbar">
          <button id="sidebarToggle" class="quiet icon-only" type="button" aria-label="Pokaż lub schowaj sidebar"></button>
          <form id="trackSearchForm" class="global-search">
            <input id="trackQuery" type="search" placeholder="Szukaj utworów, artystów, albumów..." />
            <button type="submit">Szukaj</button>
          </form>
        </header>

        <section id="libraryPanel" class="panel content-panel">
          <div class="panel-head">
            <div>
              <h2 id="pageTitle">Start</h2>
              <p id="pageSubtitle" class="panel-subtitle">Wracaj do albumów i odkrywaj bibliotekę</p>
            </div>
          </div>
          <div id="tracksList" class="page-content empty">Podaj token i połącz bibliotekę.</div>
        </section>

        <p id="message" class="message" role="status"></p>
      </section>

      <section class="player-panel">
        <div class="now-block">
          <div>
            <span class="label">Teraz odtwarzane</span>
            <h2 id="nowTitle">Wybierz utwór</h2>
            <p id="nowMeta">Odtwarzacz załaduje plik przez API z tokenem.</p>
          </div>
        </div>
        <div class="custom-player">
          <span id="currentTime">0:00</span>
          <input id="seekBar" class="seek" type="range" min="0" max="1000" value="0" aria-label="Pozycja utworu" />
          <span id="durationTime">0:00</span>
        </div>
        <div class="transport">
          <button id="shuffleToggle" class="quiet icon-only" type="button" aria-label="Shuffle"></button>
          <button id="prevTrack" class="quiet icon-only" type="button" aria-label="Poprzedni"></button>
          <button id="playPause" class="primary icon-only" type="button" aria-label="Odtwórz"></button>
          <button id="nextTrack" class="quiet icon-only" type="button" aria-label="Następny"></button>
          <button id="loopToggle" class="quiet icon-only" type="button" aria-label="Loop"></button>
          <button id="muteToggle" class="quiet icon-only" type="button" aria-label="Wycisz"></button>
          <input id="volumeBar" class="volume" type="range" min="0" max="1" step="0.01" value="1" aria-label="Głośność" />
        </div>
        <audio id="audio" preload="none"></audio>
      </section>
    </main>
    <script src="static/app.js" defer></script>
  </body>
</html>
